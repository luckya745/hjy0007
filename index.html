<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>해동고승전 독음 웹 앱</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="eyebrow">국사편찬위원회 한국사데이터베이스</span>
        <h1>海東高僧傳(해동고승전)</h1>
      </div>

      <label class="search">
        <span>검색</span>
        <input id="searchInput" type="search" placeholder="승려명, 본문, 주석 검색">
      </label>

      <div class="filters" id="volumeTabs"></div>
      <nav class="chapter-list" id="chapterList" aria-label="목차"></nav>
    </aside>

    <main class="reader">
      <section class="summary" id="summary"></section>
      <section class="content-shell">
        <article class="chapter" id="chapter"></article>
        <aside class="notes-panel">
          <div class="notes-head">
            <h2>주석</h2>
            <button class="icon-button" id="toggleNotes" type="button" aria-label="주석 접기">⌕</button>
          </div>
          <div class="notes-list" id="notesList"></div>
        </aside>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./summaries.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
